services:
  - type: web
    name: twinroute
    runtime: node
    plan: free
    region: oregon
    autoDeployTrigger: commit
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_REGION
        value: oregon
